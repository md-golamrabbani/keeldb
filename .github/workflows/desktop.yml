name: Desktop build

# Build the Tauri desktop app (with the PyInstaller Python sidecar) for
# Windows, macOS, and Linux. Triggered manually or on a version tag.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# The default GITHUB_TOKEN is read-only in some repo/org settings, which makes
# creating the tagged Release fail with 403 "Resource not accessible by
# integration". Grant write access to repository contents (releases live there).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04      # linux x86_64
          - os: windows-latest    # windows x86_64
          - os: macos-latest      # macOS arm64 (Apple Silicon)
          - os: macos-13          # macOS x86_64 (Intel)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: dtolnay/rust-toolchain@stable

      - name: Linux system deps (WebKitGTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential

      - name: Build backend sidecar (Unix)
        if: runner.os != 'Windows'
        run: bash backend/build_sidecar.sh

      - name: Build backend sidecar (Windows)
        if: runner.os == 'Windows'
        run: powershell -File backend/build_sidecar.ps1

      - name: Place sidecar with target-triple name
        shell: bash
        run: |
          TRIPLE=$(rustc -Vv | grep '^host:' | cut -d' ' -f2)
          mkdir -p frontend/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp backend/dist/keeldb-backend.exe "frontend/src-tauri/binaries/keeldb-backend-${TRIPLE}.exe"
          else
            cp backend/dist/keeldb-backend "frontend/src-tauri/binaries/keeldb-backend-${TRIPLE}"
            chmod +x "frontend/src-tauri/binaries/keeldb-backend-${TRIPLE}"
          fi

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate app icons (placeholder if none committed)
        working-directory: frontend
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.png ]; then
            npx @tauri-apps/cli icon ../logo.png || echo "Provide src-tauri/icons via 'npx @tauri-apps/cli icon <png>'"
          fi

      - name: Build desktop app
        working-directory: frontend
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: keeldb-${{ matrix.os }}
          path: |
            frontend/src-tauri/target/release/bundle/**/*.dmg
            frontend/src-tauri/target/release/bundle/**/*.AppImage
            frontend/src-tauri/target/release/bundle/**/*.deb
            frontend/src-tauri/target/release/bundle/**/*.rpm
            frontend/src-tauri/target/release/bundle/**/*.msi
            frontend/src-tauri/target/release/bundle/**/*.exe

      # On a version tag (git tag v0.1.0 && git push --tags) the installers are
      # also attached to a GitHub Release — the shareable download page, and
      # what the in-app update check watches.
      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            frontend/src-tauri/target/release/bundle/**/*.dmg
            frontend/src-tauri/target/release/bundle/**/*.deb
            frontend/src-tauri/target/release/bundle/**/*.rpm
            frontend/src-tauri/target/release/bundle/**/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
